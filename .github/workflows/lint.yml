name: "Lint"

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"

jobs:
  ruff:
    name: "Ruff"
    runs-on: "ubuntu-latest"
    steps:
        - name: "Checkout the repository"
          uses: "actions/checkout@v4"

        - name: "Set up Python"
          uses: actions/setup-python@v5.1.1
          with:
            python-version: "3.10"
            cache: "pip"

        - name: "Install Ruff"
          run: python3 -m pip install ruff==0.6.1

        - name: "Run"
          run: python3 -m ruff check .
